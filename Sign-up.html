<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up</title>
</head>
<body>

  <h2>Create an Account</h2>

  <form action="#" method="POST">

    <label for="fname">First Name:</label><br>
    <input type="text" id="fname" name="fname" placeholder="Enter first name" required><br><br>

    <label for="lname">Last Name:</label><br>
    <input type="text" id="lname" name="lname" placeholder="Enter last name" required><br><br>

    <label for="email">Email Address:</label><br>
    <input type="email" id="email" name="email" placeholder="Enter email" required><br><br>

    <label for="password">Password:</label><br>
    <input type="password" id="password" name="password" placeholder="Enter password" required><br><br>

    <label for="confirm">Confirm Password:</label><br>
    <input type="password" id="confirm" name="confirm" placeholder="Confirm password" required><br><br>

    <input type="checkbox" id="agree" name="agree" required>
    <label for="agree">I agree to the Terms and Conditions</label><br><br>

    <input type="submit" value="Sign Up">

  </form>

  <br>
  <p>Already have an account? <a href="#">Sign in</a></p>

</body>
</html>
